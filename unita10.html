<script>
const cards = [
  // ãã TEORIA (25) ãããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  {
    cat: "teoria",
    q: "Definizione di equazione differenziale e di ordine.",
    a: "Un'<strong>equazione differenziale</strong> û´ un'equazione che ha per incognita una funzione \\(y\\) della variabile \\(x\\) e stabilisce una relazione tra \\(x\\), \\(y\\) e almeno una delle sue derivate: \\(F(x;y;y';\\ldots;y^{(n)})=0\\). L'<strong>ordine</strong> û´ il massimo ordine di derivazione che compare nell'equazione. Es: \\(y''-2y'+y=0\\) û´ del secondo ordine; \\(y'-4x^2+1=0\\) û´ del primo ordine."
  },
  {
    cat: "teoria",
    q: "Cos'û´ l'integrale generale e l'integrale particolare di una EDO?",
    a: "L'<strong>integrale generale</strong> û´ l'insieme di tutte le infinite soluzioni dell'equazione differenziale, dipendente da uno o piû¿ parametri \\(c_1, c_2, \\ldots, c_n\\) (tanti quanti û´ l'ordine). Geometricamente û´ una famiglia di <em>curve integrali</em>. L'<strong>integrale (o soluzione) particolare</strong> si ottiene attribuendo ai parametri valori specifici, determinati da condizioni aggiuntive (es. il problema di Cauchy)."
  },
  {
    cat: "teoria",
    q: "Cos'û´ il problema di Cauchy?",
    a: "Il <strong>problema di Cauchy</strong> consiste nel trovare una soluzione particolare \\(y=f(x)\\) di un'equazione differenziale che soddisfi determinate <em>condizioni iniziali</em>. Per un'equazione di ordine \\(n\\), le condizioni sono: \\[F(x;y;y'\\ldots;y^{(n)})=0,\\quad y(x_0)=y_0,\\quad y'(x_0)=y_1,\\ldots,y^{(n-1)}(x_0)=y_{n-1}\\] Un'equazione di ordine \\(n\\) dipende da \\(n\\) parametri, quindi occorrono \\(n+1\\) condizioni per determinarlo."
  },
  {
    cat: "teoria",
    q: "Come si risolvono le equazioni differenziali del tipo \\(y'=f(x)\\)?",
    a: "Si isola \\(y'\\) e si integrano entrambi i membri rispetto a \\(x\\): \\[\\int y'\\,dx = \\int f(x)\\,dx \\quad\\Rightarrow\\quad y = \\int f(x)\\,dx\\] L'integrale generale û´ \\(y=F(x)+c\\), dove \\(F(x)\\) û´ una primitiva di \\(f(x)\\) e \\(c\\in\\mathbb{R}\\) û´ il parametro libero. Si tratta del caso piû¿ semplice: l'equazione si riduce a trovare una primitiva."
  },
  {
    cat: "teoria",
    q: "Definizione di equazione differenziale a variabili separabili e procedura di risoluzione.",
    a: "Un'EDO del primo ordine û´ <strong>a variabili separabili</strong> se puûý essere scritta nella forma \\(y'=g(x)\\cdot h(y)\\). Procedura: (1) si scrive \\(y'=\\frac{dy}{dx}\\) e si separa: \\(\\frac{dy}{h(y)}=g(x)\\,dx\\), supponendo \\(h(y)\\neq0\\); (2) si integrano entrambi i membri: \\(\\int\\frac{dy}{h(y)}=\\int g(x)\\,dx\\); (3) si ricava \\(y\\) in funzione di \\(x\\); (4) si esaminano separatamente i casi derivanti da \\(h(y)=0\\)."
  },
  {
    cat: "teoria",
    q: "Come si riconosce se un'equazione differenziale û´ a variabili separabili?",
    a: "Un'equazione \\(y'=f(x,y)\\) û´ a variabili separabili se \\(f\\) si scrive come <em>prodotto</em> di una funzione solo di \\(x\\) per una funzione solo di \\(y\\): \\(f(x,y)=g(x)\\cdot h(y)\\). Es: \\(y'=2x(y-1)^2\\) û´ separabile (\\(g=2x\\), \\(h=(y-1)^2\\)). Invece \\(y'=2x+(y-1)^2\\) non û´ separabile perchûˋ \\(f\\) û´ una <em>somma</em>, non un prodotto."
  },
  {
    cat: "teoria",
    q: "Definizione di equazione differenziale lineare del primo ordine.",
    a: "Un'EDO del primo ordine û´ <strong>lineare</strong> se puûý essere scritta nella forma: \\[y'=a(x)\\cdot y+b(x)\\] dove \\(a(x)\\) e \\(b(x)\\) sono funzioni continue in un opportuno intervallo. Se \\(b(x)=0\\): equazione <strong>omogenea</strong>. Se \\(b(x)\\neq0\\): equazione <strong>completa</strong>. La linearitû  significa che \\(y\\) e \\(y'\\) compaiono solo al primo grado (non \\(y^2\\), \\((y')^2\\), ecc.)."
  },
  {
    cat: "teoria",
    q: "Risoluzione dell'equazione lineare del primo ordine omogenea \\(y'=a(x)\\cdot y\\).",
    a: "L'equazione omogenea \\(y'=a(x)\\cdot y\\) û´ a variabili separabili. Separando (\\(y\\neq0\\)): \\(\\frac{dy}{y}=a(x)\\,dx\\). Integrando: \\(\\ln|y|=A(x)+k\\), dove \\(A(x)=\\int a(x)\\,dx\\). Quindi: \\[y=e^{A(x)+k}=ke^{A(x)}\\quad (k\\in\\mathbb{R})\\] L'integrale generale û´ \\(y=ke^{\\int a(x)\\,dx}\\), con \\(k\\in\\mathbb{R}\\). Nota: \\(y=0\\) û´ anch'essa soluzione (caso \\(k=0\\))."
  },
  {
    cat: "teoria",
    q: "Formula risolutiva per l'equazione lineare del primo ordine completa \\(y'=a(x)y+b(x)\\).",
    a: "Si calcola la primitiva \\(A(x)=\\int a(x)\\,dx\\). La soluzione generale û´: \\[y=e^{A(x)}\\left[\\int b(x)e^{-A(x)}\\,dx+c\\right]\\] Il termine \\(e^{A(x)}\\) û´ il <em>fattore integrante</em>. La formula si ottiene moltiplicando entrambi i membri per \\(e^{-A(x)}\\), riconoscendo nel primo membro la derivata di \\(ye^{-A(x)}\\), e poi integrando."
  },
  {
    cat: "teoria",
    q: "Come si ottiene la formula risolutiva per l'equazione lineare completa?",
    a: "Si porta \\(a(x)y\\) al primo membro: \\(y'-a(x)y=b(x)\\). Si moltiplica per \\(e^{-A(x)}\\): \\(y'e^{-A(x)}-a(x)ye^{-A(x)}=b(x)e^{-A(x)}\\). Il primo membro û´ \\(\\mathrm{D}[ye^{-A(x)}]\\). Integrando: \\(ye^{-A(x)}=\\int b(x)e^{-A(x)}\\,dx+c\\). Moltiplicando per \\(e^{A(x)}\\): \\(y=e^{A(x)}\\left[\\int b(x)e^{-A(x)}\\,dx+c\\right]\\)."
  },
  {
    cat: "teoria",
    q: "Struttura dell'equazione differenziale lineare del secondo ordine a coefficienti costanti.",
    a: "La forma generale û´: \\[y''+by'+cy=r(x)\\] dove \\(b,c\\in\\mathbb{R}\\) sono costanti e \\(r(x)\\) û´ una funzione continua. Se \\(r(x)=0\\): <strong>omogenea</strong>. Se \\(r(x)\\neq0\\): <strong>completa</strong>. L'integrale generale dell'omogenea dipende da 2 parametri; quello della completa si ottiene sommando l'integrale dell'omogenea e una soluzione particolare della completa."
  },
  {
    cat: "teoria",
    q: "Equazione caratteristica di un'EDO lineare del 2ô¯ ordine omogenea e come si usa.",
    a: "Data \\(y''+by'+cy=0\\), si cerca la soluzione nella forma \\(y=e^{zx}\\). Sostituendo: \\(z^2e^{zx}+bze^{zx}+ce^{zx}=0\\), e dividendo per \\(e^{zx}\\neq0\\): \\[z^2+bz+c=0\\] Questa û´ l'<strong>equazione caratteristica</strong>. Le sue radici \\(z_1, z_2\\) determinano la forma dell'integrale generale, che dipende dal segno del discriminante \\(\\Delta=b^2-4c\\)."
  },
  {
    cat: "teoria",
    q: "Caso \\(\\Delta>0\\) per l'EDO omogenea del 2ô¯ ordine: soluzione generale.",
    a: "Se \\(\\Delta=b^2-4c>0\\), l'equazione caratteristica \\(z^2+bz+c=0\\) ha due radici reali distinte \\(z_1\\neq z_2\\). Le due soluzioni particolari indipendenti sono \\(y_1=e^{z_1 x}\\) e \\(y_2=e^{z_2 x}\\). L'integrale generale û´: \\[y=c_1 e^{z_1 x}+c_2 e^{z_2 x}, \\quad c_1,c_2\\in\\mathbb{R}\\]"
  },
  {
    cat: "teoria",
    q: "Caso \\(\\Delta=0\\) per l'EDO omogenea del 2ô¯ ordine: soluzione generale.",
    a: "Se \\(\\Delta=b^2-4c=0\\), l'equazione caratteristica ha una radice reale doppia \\(z_1=z_2=z=-\\frac{b}{2}\\). Le due soluzioni particolari indipendenti sono \\(y_1=e^{zx}\\) e \\(y_2=xe^{zx}\\). L'integrale generale û´: \\[y=c_1 e^{zx}+c_2 xe^{zx}=e^{zx}(c_1+c_2 x), \\quad c_1,c_2\\in\\mathbb{R}\\]"
  },
  {
    cat: "teoria",
    q: "Caso \\(\\Delta<0\\) per l'EDO omogenea del 2ô¯ ordine: soluzione generale.",
    a: "Se \\(\\Delta=b^2-4c<0\\), le radici dell'equazione caratteristica sono complesse coniugate: \\(z_{1,2}=\\alpha\\pm i\\beta\\), con \\(\\alpha=-\\frac{b}{2}\\) e \\(\\beta=\\frac{\\sqrt{4c-b^2}}{2}\\). L'integrale generale û´: \\[y=e^{\\alpha x}(c_1\\cos\\beta x+c_2\\sin\\beta x), \\quad c_1,c_2\\in\\mathbb{R}\\]"
  },
  {
    cat: "teoria",
    q: "Come si risolve un'EDO lineare del 2ô¯ ordine completa \\(y''+by'+cy=r(x)\\)?",
    a: "L'integrale generale della completa û´: \\[y=y_g+y_p\\] dove \\(y_g=c_1 y_1+c_2 y_2\\) û´ l'integrale generale dell'omogenea associata e \\(y_p\\) û´ <em>una</em> soluzione particolare della completa. Si trova \\(y_p\\) cercandola della stessa forma di \\(r(x)\\) (metodo di somiglianza): se \\(r(x)\\) û´ un polinomio, si cerca \\(y_p\\) polinomio; se \\(r(x)=Ae^{\\mu x}\\), si cerca \\(y_p=Be^{\\mu x}\\)."
  },
  {
    cat: "teoria",
    q: "Come si trova la soluzione particolare \\(y_p\\) dell'equazione completa col metodo di somiglianza?",
    a: "Si ipotizza \\(y_p\\) della stessa forma di \\(r(x)\\): se \\(r(x)=ax+b\\) si pone \\(y_p=Ax+B\\); se \\(r(x)=ae^{\\mu x}\\) si pone \\(y_p=Ae^{\\mu x}\\); se \\(r(x)=a\\sin\\omega x+b\\cos\\omega x\\) si pone \\(y_p=A\\sin\\omega x+B\\cos\\omega x\\). Si sostituisce nell'equazione e si identificano i coefficienti incogniti \\(A\\), \\(B\\) uguagliando i coefficienti dei termini simili. Eccezione: se \\(r(x)\\) û´ soluzione dell'omogenea, si moltiplica \\(y_p\\) per \\(x\\)."
  },
  {
    cat: "teoria",
    q: "Tavola riepilogativa delle soluzioni dell'EDO omogenea del 2ô¯ ordine.",
    a: "<strong>\\(\\Delta>0\\):</strong> radici reali distinte \\(z_1\\neq z_2\\) ã \\(y=c_1e^{z_1 x}+c_2e^{z_2 x}\\). <strong>\\(\\Delta=0\\):</strong> radice reale doppia \\(z\\) ã \\(y=e^{zx}(c_1+c_2 x)\\). <strong>\\(\\Delta<0\\):</strong> radici complesse \\(\\alpha\\pm i\\beta\\) ã \\(y=e^{\\alpha x}(c_1\\cos\\beta x+c_2\\sin\\beta x)\\). In tutti i casi, \\(c_1,c_2\\in\\mathbb{R}\\)."
  },
  {
    cat: "teoria",
    q: "Legge di raffreddamento di Newton: modello con EDO.",
    a: "La velocitû  di variazione della temperatura \\(T(t)\\) di un corpo û´ proporzionale alla differenza tra la temperatura del corpo e quella dell'ambiente \\(T_a\\): \\[T'=-k(T-T_a)\\] con \\(k>0\\). û un'EDO lineare del primo ordine (o a variabili separabili). La soluzione û´: \\(T(t)=T_a+(T_0-T_a)e^{-kt}\\), dove \\(T_0=T(0)\\) û´ la temperatura iniziale. La temperatura si avvicina esponenzialmente a \\(T_a\\)."
  },
  {
    cat: "teoria",
    q: "Modello preda-predatore: che tipo di EDO genera?",
    a: "Il modello di Lotka-Volterra descrive la dinamica di due popolazioni (prede \\(x\\) e predatori \\(y\\)) con un <em>sistema</em> di EDO del primo ordine: \\(x'=ax-bxy\\) e \\(y'=-cy+dxy\\). Ogni equazione û´ non lineare (contiene il prodotto \\(xy\\)). La variabile \\(t\\) û´ il tempo; \\(a,b,c,d>0\\) sono costanti. Le soluzioni sono periodiche: le popolazioni oscillano in cicli."
  },
  {
    cat: "teoria",
    q: "Decadimento radioattivo: EDO e soluzione.",
    a: "La massa \\(m(t)\\) di una sostanza radioattiva decade a velocitû  proporzionale alla massa presente: \\[m'=-\\lambda m\\] con \\(\\lambda>0\\) costante di decadimento. û un'EDO a variabili separabili (omogenea lineare). La soluzione û´: \\(m(t)=m_0 e^{-\\lambda t}\\), dove \\(m_0=m(0)\\). Il <strong>tempo di dimezzamento</strong> \\(t_{1/2}=\\frac{\\ln 2}{\\lambda}\\) û´ il tempo in cui la massa si dimezza."
  },
  {
    cat: "teoria",
    q: "Oscillatore armonico smorzato: modello EDO.",
    a: "Un corpo attaccato a una molla e immerso in un fluido viscoso û´ descritto dall'equazione del secondo ordine: \\[y''+by'+cy=0\\] dove \\(y(t)\\) û´ la posizione, \\(b>0\\) û´ il coefficiente di smorzamento e \\(c>0\\) la costante elastica. Se \\(\\Delta=b^2-4c>0\\): sovrasmorzato (nessuna oscillazione). Se \\(\\Delta=0\\): smorzamento critico. Se \\(\\Delta<0\\): sottosmorzato (oscillazioni smorzate), con soluzione \\(y=e^{\\alpha t}(c_1\\cos\\beta t+c_2\\sin\\beta t)\\)."
  },
  {
    cat: "teoria",
    q: "Cosa si intende per 'soluzione di un'equazione differenziale' in senso rigoroso?",
    a: "Una funzione \\(y=f(x)\\) û´ soluzione di \\(F(x;y;y';\\ldots;y^{(n)})=0\\) in un intervallo \\(I\\) se: (1) \\(f\\) û´ derivabile \\(n\\) volte in \\(I\\); (2) sostituendo \\(y=f(x)\\) e le sue derivate nell'equazione si ottiene un'identitû  vera per ogni \\(x\\in I\\). Il grafico di una soluzione si chiama <em>curva integrale</em>. Verificare una soluzione significa solo fare questa sostituzione."
  },
  {
    cat: "teoria",
    q: "Perchûˋ l'integrale generale di un'EDO di ordine \\(n\\) dipende da \\(n\\) costanti?",
    a: "Ogni integrazione introduce una costante arbitraria. Per risolvere un'EDO di ordine \\(n\\) occorre integrare (in senso generalizzato) \\(n\\) volte, introducendo \\(n\\) costanti \\(c_1,\\ldots,c_n\\). Geometricamente, ci sono infinite curve integrali (una per ogni scelta dei parametri). Per selezionarne una unica occorrono \\(n\\) condizioni aggiuntive (il problema di Cauchy), che fissano i valori di \\(y\\) e delle sue prime \\(n-1\\) derivate in un punto \\(x_0\\)."
  },
  {
    cat: "teoria",
    q: "Crescita logistica: modello EDO e soluzione.",
    a: "Una popolazione \\(P(t)\\) con capacitû  portante \\(K\\) soddisfa: \\[P'=rP\\left(1-\\frac{P}{K}\\right)\\] con \\(r>0\\) tasso di crescita. û a variabili separabili. La soluzione û´ la <em>curva logistica</em>: \\(P(t)=\\frac{K}{1+Ae^{-rt}}\\), con \\(A=\\frac{K-P_0}{P_0}\\). Per \\(P\\ll K\\): crescita quasi esponenziale. Per \\(P\\to K\\): rallentamento. Il modello descrive la crescita in presenza di risorse limitate."
  },

  // ãã ESERCIZI (20) ããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
  {

  {

  {

  {

  {

  {

  {

  {

  {

  // ãã RAGIONAMENTO (15) ããããããããããããããããããããããããããããããããããããããããããããããããããããã
  {
    cat: "ragionamento",
    q: "Perchûˋ l'integrale generale di un'EDO del primo ordine û´ una famiglia di curve, non una singola curva?",
    a: "Perchûˋ risolvere un'EDO del primo ordine richiede un'integrazione, che introduce una costante arbitraria \\(c\\in\\mathbb{R}\\). Ogni valore di \\(c\\) dû  una curva diversa: le curve integrali formano una <em>famiglia uniparametrica</em>. Geometricamente, le infinite curve 'coprono' il piano cartesiano senza intersecarsi (per il teorema di esistenza e unicitû ). Solo imponendo un punto di passaggio (Cauchy) si isola una singola curva."
  },
  {
    cat: "ragionamento",
    q: "Qual û´ la differenza tra un'equazione a variabili separabili e una lineare del primo ordine? Possono coincidere?",
    a: "Un'equazione û´ <strong>separabile</strong> se si scrive \\(y'=g(x)h(y)\\); û´ <strong>lineare</strong> se si scrive \\(y'=a(x)y+b(x)\\). Possono coincidere: l'equazione lineare omogenea \\(y'=a(x)y\\) û´ anche separabile (\\(g=a(x)\\), \\(h=y\\)). L'equazione lineare completa \\(y'=a(x)y+b(x)\\) invece in generale non û´ separabile (a meno che \\(b(x)=a(x)k\\) per qualche costante \\(k\\))."
  },
  {
    cat: "ragionamento",
    q: "Cosa succede se si 'dimentica' di esaminare il caso \\(h(y)=0\\) nella separazione delle variabili?",
    a: "Si perdono le <em>soluzioni singolari</em>: quelle che annullano \\(h(y)\\). Ad esempio, in \\(y'=4xy^2\\), dividendo per \\(y^2\\) si esclude \\(y=0\\); ma \\(y\\equiv0\\) soddisfa l'equazione (\\(0=4x\\cdot0\\)). û una soluzione singolare non contenuta nell'integrale generale \\(y=-\\frac{1}{2x^2+c}\\) (che non si annulla mai). Ignorarla porta a una descrizione incompleta dell'insieme di tutte le soluzioni."
  },
  {
    cat: "ragionamento",
    q: "Perchûˋ per un'EDO del secondo ordine occorrono due condizioni iniziali (problema di Cauchy)?",
    a: "L'EDO del secondo ordine ha un integrale generale che dipende da due costanti \\(c_1, c_2\\) (perchûˋ si integra due volte). Per determinare univocamente una soluzione, occorre fissare il 'punto iniziale' della curva e la sua 'direzione': cioû´ il valore di \\(y(x_0)\\) e di \\(y'(x_0)\\). Con una sola condizione rimane un parametro libero e si ottiene ancora una famiglia di soluzioni, non una sola."
  },
  {
    cat: "ragionamento",
    q: "Perchûˋ l'equazione caratteristica di un'EDO del 2ô¯ ordine û´ un polinomio di grado 2 in \\(z\\)?",
    a: "Perchûˋ si cerca la soluzione nella forma \\(y=e^{zx}\\): sostituendo \\(y''=z^2e^{zx}\\), \\(y'=ze^{zx}\\), \\(y=e^{zx}\\) nell'equazione \\(y''+by'+cy=0\\), si raccoglie \\(e^{zx}\\neq0\\) e si ottiene \\(z^2+bz+c=0\\), che û´ appunto un polinomio di grado 2 in \\(z\\). Il grado corrisponde all'ordine dell'EDO: per un'EDO di ordine \\(n\\), l'equazione caratteristica ha grado \\(n\\)."
  },
  {
    cat: "ragionamento",
    q: "Nel caso \\(\\Delta=0\\), perchûˋ la soluzione generale û´ \\(y=e^{zx}(c_1+c_2 x)\\) e non \\(y=c_1 e^{zx}+c_2 e^{zx}=(c_1+c_2)e^{zx}\\)?",
    a: "Con radice doppia \\(z\\), la funzione \\(e^{zx}\\) û´ solo una soluzione. Se si usasse \\(c_1 e^{zx}+c_2 e^{zx}\\), si otterrebbe \\((c_1+c_2)e^{zx}\\) con un solo parametro effettivo \\(c_1+c_2\\): non û´ l'integrale generale, che ne richiede due. La seconda soluzione indipendente û´ \\(xe^{zx}\\) (si verifica sostituendo nell'equazione). Il Wronskiano di \\(e^{zx}\\) e \\(xe^{zx}\\) û´ non nullo, confermando l'indipendenza lineare."
  },
  {

// ããã STATE & LOGIC ããããããããããããããããããããããããããããããããããããããããããããããããããããããããããã
let filtered=[...cards],deck=[...cards],idx=0,currentFilter="all",currentMode="quiz";

document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentFilter=btn.dataset.filter;applyFilter();
}));
document.querySelectorAll(".mode-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentMode=btn.dataset.mode;switchMode();
}));

function applyFilter(){
  filtered=currentFilter==="all"?[...cards]:cards.filter(c=>c.cat===currentFilter);
  deck=[...filtered];idx=0;
  document.getElementById("stat-pill").textContent=filtered.length+" carte";
  if(currentMode==="quiz"){
    document.getElementById("score-panel").classList.remove("visible");
    document.getElementById("flip-scene").style.display="";
    document.querySelectorAll(".quiz-nav button").forEach(b=>b.disabled=false);
    renderCard();
  } else renderBrowse();
}

function switchMode(){
  if(currentMode==="quiz"){
    document.getElementById("browse-view").style.display="none";
    document.getElementById("quiz-view").style.display="flex";
    deck=[...filtered];idx=0;
    document.getElementById("score-panel").classList.remove("visible");
    document.getElementById("flip-scene").style.display="";
    document.querySelector(".quiz-nav").style.display="";
    renderCard();
  } else {
    document.getElementById("quiz-view").style.display="none";
    document.getElementById("browse-view").style.display="grid";
    renderBrowse();
  }
}

function renderCard(){
  if(!deck.length)return;
  const c=deck[idx];
  const fc=document.getElementById("flip-card");
  fc.classList.remove("flipped");fc.dataset.cat=c.cat;
  document.getElementById("fc-tag").textContent=c.cat.charAt(0).toUpperCase()+c.cat.slice(1);
  document.getElementById("fc-q").innerHTML=c.q;
  document.getElementById("fc-a").innerHTML=c.a;
  document.getElementById("qcounter").textContent=(idx+1)+" / "+deck.length;
  document.getElementById("qpf").style.width=((idx+1)/deck.length*100)+"%";
  document.getElementById("btn-prev").disabled=idx===0;
  document.getElementById("btn-next").textContent=idx===deck.length-1?"Fine ã":"Avanti ã";
  if(window.MathJax)MathJax.typesetPromise([document.getElementById("flip-card")]);
}

function flipCard(){document.getElementById("flip-card").classList.toggle("flipped");}
function nextCard(){
  if(idx<deck.length-1){idx++;renderCard();}
  else{
    document.getElementById("flip-scene").style.display="none";
    document.querySelector(".quiz-nav").style.display="none";
    document.getElementById("score-num").textContent=deck.length;
    document.getElementById("score-panel").classList.add("visible");
  }
}
function prevCard(){if(idx>0){idx--;renderCard();}}
function shuffle(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;document.getElementById("score-panel").classList.remove("visible");
  document.getElementById("flip-scene").style.display="";document.querySelector(".quiz-nav").style.display="";renderCard();
}
function restart(){
  deck=[...filtered];idx=0;
  document.getElementById("score-panel").classList.remove("visible");
  document.getElementById("flip-scene").style.display="";document.querySelector(".quiz-nav").style.display="";renderCard();
}
function renderBrowse(){
  const container=document.getElementById("browse-view");container.innerHTML="";
  filtered.forEach((c,i)=>{
    const div=document.createElement("div");div.className="browse-card";div.dataset.cat=c.cat;
    div.innerHTML=`<div class="bc-header"><span class="bc-num">#${i+1}</span><span class="bc-tag tag-${c.cat}">${c.cat.charAt(0).toUpperCase()+c.cat.slice(1)}</span></div><div class="bc-q">${c.q}</div><div class="bc-divider"></div><div class="bc-a-label">Risposta</div><div class="bc-a">${c.a}</div>`;
    container.appendChild(div);
  });
  if(window.MathJax)MathJax.typesetPromise([container]);
}
renderCard();
</script>
