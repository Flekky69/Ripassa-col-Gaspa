<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limiti — Flashcards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008; --paper: #f5f0e8; --paper-dark: #ebe4d4;
    --gold: #c8963e; --gold-light: #e8b55a;
    --red: #8b2020; --blue: #1a3a5c; --green: #1a4a2e;
    --shadow: rgba(26,16,8,0.18); --card-w: min(560px, 94vw);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; background-image: radial-gradient(ellipse at 10% 20%, rgba(200,150,62,0.07) 0%, transparent 60%), radial-gradient(ellipse at 90% 80%, rgba(26,58,92,0.06) 0%, transparent 60%); }
  header { text-align: center; padding: 2.5rem 1rem 1.5rem; border-bottom: 2px solid var(--gold); background: linear-gradient(180deg, rgba(200,150,62,0.08) 0%, transparent 100%); position: relative; }
  header::before { content: "lim"; position: absolute; left: 50%; top: .6rem; transform: translateX(-50%); font-size: 4rem; opacity: .04; font-family: 'Playfair Display', serif; pointer-events: none; user-select: none; font-style: italic; }
  header h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 700; letter-spacing: .04em; color: var(--ink); }
  header p { margin-top: .4rem; font-size: .9rem; color: #6b5a3e; font-style: italic; letter-spacing: .06em; }
  .home-link { display: inline-block; margin-bottom: .8rem; font-size: .8rem; color: #8a7458; text-decoration: none; letter-spacing: .06em; border: 1px solid rgba(200,150,62,.35); padding: .28rem .7rem; border-radius: 4px; transition: all .18s; }
  .home-link:hover { color: var(--gold); border-color: var(--gold); background: rgba(200,150,62,.07); }
  .controls { display: flex; flex-wrap: wrap; gap: .6rem; justify-content: center; padding: 1.2rem 1rem .8rem; border-bottom: 1px solid rgba(200,150,62,.3); background: rgba(245,240,232,.8); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(6px); }
  .tab-group { display: flex; gap: 0; border: 1.5px solid var(--gold); border-radius: 6px; overflow: hidden; }
  .tab-btn { padding: .42rem .9rem; font-family: 'Source Serif 4', serif; font-size: .82rem; border: none; background: transparent; cursor: pointer; color: #6b5a3e; transition: all .2s; letter-spacing: .03em; }
  .tab-btn.active { background: var(--gold); color: #fff; font-weight: 600; }
  .tab-btn:not(.active):hover { background: rgba(200,150,62,.15); }
  .mode-group { display: flex; gap: 0; border: 1.5px solid var(--blue); border-radius: 6px; overflow: hidden; }
  .mode-btn { padding: .42rem .9rem; font-family: 'Source Serif 4', serif; font-size: .82rem; border: none; background: transparent; cursor: pointer; color: var(--blue); transition: all .2s; letter-spacing: .03em; }
  .mode-btn.active { background: var(--blue); color: #fff; font-weight: 600; }
  .mode-btn:not(.active):hover { background: rgba(26,58,92,.1); }
  .stat-pill { padding: .38rem .75rem; background: rgba(26,16,8,.06); border-radius: 20px; font-size: .78rem; color: #6b5a3e; letter-spacing: .04em; align-self: center; }
  main { padding: 1.5rem 1rem 3rem; }
  #browse-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(340px,94vw), 1fr)); gap: 1.2rem; max-width: 1200px; margin: 0 auto; }
  .browse-card { background: #fff; border-radius: 10px; padding: 1.2rem 1.4rem; box-shadow: 0 2px 8px var(--shadow); border-left: 4px solid var(--gold); transition: transform .15s, box-shadow .15s; }
  .browse-card:hover { transform: translateY(-2px); box-shadow: 0 5px 16px var(--shadow); }
  .browse-card[data-cat="esercizio"] { border-left-color: var(--red); }
  .browse-card[data-cat="ragionamento"] { border-left-color: var(--green); }
  .bc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .7rem; }
  .bc-num { font-family: 'Playfair Display', serif; font-size: 1.05rem; font-weight: 700; color: var(--gold); }
  .browse-card[data-cat="esercizio"] .bc-num { color: var(--red); }
  .browse-card[data-cat="ragionamento"] .bc-num { color: var(--green); }
  .bc-tag { font-size: .67rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; padding: .2rem .5rem; border-radius: 3px; }
  .tag-teoria { background: rgba(200,150,62,.15); color: var(--gold); }
  .tag-esercizio { background: rgba(139,32,32,.12); color: var(--red); }
  .tag-ragionamento { background: rgba(26,74,46,.12); color: var(--green); }
  .bc-q { font-size: .92rem; line-height: 1.55; color: #2a1f0d; font-weight: 600; margin-bottom: .6rem; }
  .bc-divider { height: 1px; background: rgba(200,150,62,.25); margin: .6rem 0; }
  .bc-a { font-size: .88rem; line-height: 1.6; color: #3a2f1d; font-style: italic; }
  .bc-a-label { font-size: .7rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #8a7458; margin-bottom: .3rem; font-style: normal; }
  #quiz-view { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
  .quiz-progress-bar { width: var(--card-w); height: 4px; background: rgba(200,150,62,.2); border-radius: 2px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width .4s ease; }
  .quiz-counter { font-size: .82rem; color: #6b5a3e; letter-spacing: .05em; font-style: italic; width: var(--card-w); text-align: right; }
  .flip-scene { width: var(--card-w); height: min(340px, 60vw); cursor: pointer; position: relative; }
  .flip-card { width: 100%; height: 100%; position: relative; }
  .flip-face { position: absolute; inset: 0; border-radius: 14px; padding: 1.8rem; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; box-shadow: 0 6px 24px var(--shadow); overflow: auto; transition: opacity .35s ease, transform .35s ease; }
  .flip-front { background: #fff; border: 2px solid var(--gold); opacity: 1; transform: scale(1); z-index: 2; }
  .flip-front::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 30%, rgba(200,150,62,.05) 0%, transparent 70%); pointer-events: none; }
  .flip-back { background: linear-gradient(135deg, #1a3a5c 0%, #0f2236 100%); color: #e8d9c0; opacity: 0; transform: scale(.96); z-index: 1; }
  .flip-card.flipped .flip-front { opacity: 0; transform: scale(.96); z-index: 1; pointer-events: none; }
  .flip-card.flipped .flip-back { opacity: 1; transform: scale(1); z-index: 2; }
  .flip-card[data-cat="esercizio"] .flip-front { border-color: var(--red); }
  .flip-card[data-cat="esercizio"] .flip-back { background: linear-gradient(135deg, #5c1a1a 0%, #380f0f 100%); }
  .flip-card[data-cat="ragionamento"] .flip-front { border-color: var(--green); }
  .flip-card[data-cat="ragionamento"] .flip-back { background: linear-gradient(135deg, #1a4a2e 0%, #0f2e1c 100%); }
  .face-label { font-size: .68rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .5; margin-bottom: .8rem; font-style: normal; }
  .flip-back .face-label { color: #e8d9c0; }
  .face-q { font-size: clamp(.9rem, 2.5vw, 1.05rem); line-height: 1.55; font-weight: 600; color: var(--ink); z-index: 1; }
  .flip-back .face-a { font-size: clamp(.82rem, 2.3vw, .97rem); line-height: 1.65; color: #e8d9c0; font-style: italic; }
  .face-hint { position: absolute; bottom: .8rem; font-size: .68rem; opacity: .35; letter-spacing: .05em; font-style: italic; }
  .quiz-nav { display: flex; gap: .8rem; align-items: center; flex-wrap: wrap; justify-content: center; }
  .nav-btn { font-family: 'Source Serif 4', serif; font-size: .88rem; padding: .55rem 1.4rem; border-radius: 6px; cursor: pointer; border: 1.5px solid transparent; transition: all .18s; letter-spacing: .03em; }
  .nav-btn.primary { background: var(--gold); color: #fff; border-color: var(--gold); }
  .nav-btn.primary:hover { background: var(--gold-light); }
  .nav-btn.secondary { background: transparent; color: var(--ink); border-color: rgba(26,16,8,.25); }
  .nav-btn.secondary:hover { background: rgba(26,16,8,.06); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .shuffle-btn { padding: .5rem; border: none; background: none; cursor: pointer; color: #8a7458; font-size: 1.1rem; transition: transform .2s; line-height: 1; }
  .shuffle-btn:hover { transform: rotate(180deg); color: var(--gold); }
  .score-panel { display: none; flex-direction: column; align-items: center; gap: .8rem; width: var(--card-w); background: #fff; border-radius: 12px; padding: 1.8rem; box-shadow: 0 4px 20px var(--shadow); text-align: center; }
  .score-panel.visible { display: flex; }
  .score-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--ink); }
  .score-num { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); font-weight: 700; line-height: 1; }
  .score-sub { font-size: .88rem; color: #6b5a3e; font-style: italic; }
  @media (max-width: 480px) { .flip-scene { height: min(280px, 72vw); } .flip-face { padding: 1.2rem; } .face-q, .flip-back .face-a { font-size: .88rem; } }
  @media (min-width: 900px) { #browse-view { grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); } }
  .MJX-TEX { font-size: 1em !important; }
  mjx-container { margin: .15em 0; max-width: 100%; overflow-x: auto; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--paper-dark); } ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <a href="index.html" class="home-link">← Tutte le unità</a>
  <h1>Limiti</h1>
  <p>Unità 2 — Limiti &nbsp;·&nbsp; 51 Flashcards</p>
</header>

<div class="controls">
  <div class="tab-group">
    <button class="tab-btn active" data-filter="all">Tutte</button>
    <button class="tab-btn" data-filter="teoria">Teoria</button>
    <button class="tab-btn" data-filter="esercizio">Esercizi</button>
    <button class="tab-btn" data-filter="ragionamento">Ragionamento</button>
  </div>
  <div class="mode-group">
    <button class="mode-btn active" data-mode="quiz">Quiz</button>
    <button class="mode-btn" data-mode="browse">Consultazione</button>
  </div>
  <span class="stat-pill" id="stat-pill">60 carte</span>
</div>

<main>
  <div id="browse-view" style="display:none"></div>
  <div id="quiz-view">
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="qpf" style="width:0%"></div></div>
    <div class="quiz-counter" id="qcounter">1 / 60</div>
    <div class="flip-scene" id="flip-scene" onclick="flipCard()">
      <div class="flip-card" id="flip-card">
        <div class="flip-face flip-front">
          <div class="face-label" id="fc-tag">Teoria</div>
          <div class="face-q" id="fc-q"></div>
          <span class="face-hint">tocca per vedere la risposta</span>
        </div>
        <div class="flip-face flip-back">
          <div class="face-label">Risposta</div>
          <div id="fc-a" style="font-style:italic;font-size:clamp(.82rem,2.3vw,.97rem);line-height:1.65;color:#e8d9c0;"></div>
        </div>
      </div>
    </div>
    <div class="quiz-nav">
      <button class="nav-btn secondary" id="btn-prev" onclick="prevCard()" disabled>← Indietro</button>
      <button class="nav-btn primary" id="btn-next" onclick="nextCard()">Avanti →</button>
      <button class="shuffle-btn" title="Mischia le carte" onclick="shuffle()">⇄</button>
    </div>
    <div class="score-panel" id="score-panel">
      <div class="score-title">Sessione completata!</div>
      <div class="score-num" id="score-num">60</div>
      <div class="score-sub">carte studiate</div>
      <button class="nav-btn primary" onclick="restart()">Ricomincia</button>
    </div>
  </div>
</main>

<script>
const cards = [
  // ── TEORIA (23) ──────────────────────────────────────────────────────────
  {
    cat: "teoria",
    q: "Cosa è un intervallo limitato? Quali tipi di intervalli limitati conosci e come si scrivono?.",
    a: "Un <strong>intervallo limitato</strong> è un sottoinsieme di \\(\\mathbb{R}\\) che corrisponde a un segmento e può essere: <strong>chiuso</strong> \\([a;b]\\): \\(a\\leq x\\leq b\\); <strong>aperto</strong> \\(]a;b[\\): \\(a\\lt x\\lt b\\); <strong>chiuso a sinistra</strong> \\([a;b[\\): \\(a\\leq x\\lt b\\); <strong>aperto a sinistra</strong> \\(]a;b]\\): \\(a\\lt x\\leq b\\). Un intervallo è <em>aperto</em> o <em>chiuso</em> a seconda che i suoi estremi vi appartengano o meno."
  },
  {
    cat: "teoria",
    q: "Spiega i concetti di intorno (completo), intorno circolare e intorno destro/sinistro di un punto.",
    a: "Un <strong>intorno completo</strong> di \\(x_0\\) è un qualunque intervallo aperto \\(I(x_0)=]x_0-\\delta_1;x_0+\\delta_2[\\) contenente \\(x_0\\), non deve essere necessariamente simmetrico rispetto a \\(x_0\\). Un <strong>intorno circolare</strong> di raggio \\(\\delta\\) è \\(I_\\delta(x_0)=]x_0-\\delta;x_0+\\delta[\\), cioè \\(\\{x\\in\\mathbb{R}:|x-x_0|<\\delta\\}\\), ovvero è centrato in \\(x_0\\). Un <strong>intorno destro</strong> di\\(x_0\\) è \\(I^+(x_0)=]x_0;x_0+\\delta[\\); un <strong>intorno sinistro</strong> è \\(I^-(x_0)=]x_0-\\delta;x_0[\\)."
  },
  {
    cat: "teoria",
    q: "Cos'è un punto di accumulazione di un insieme?",
    a: "Il numero reale \\(x_0\\) è un <strong>punto di accumulazione</strong> di \\(A\\subseteq\\mathbb{R}\\) se ogni intorno completo di \\(x_0\\) contiene <em>infiniti</em> punti di \\(A\\). Equivalentemente, ogni intorno contiene almeno un punto di \\(A\\) distinto da \\(x_0\\). Un punto di accumulazione può appartenere o non appartenere ad \\(A\\). Un <strong>punto isolato</strong> è invece un punto di \\(A\\) per cui esiste un intorno che non contiene altri punti di \\(A\\)."
  },
  {
    cat: "teoria",
    q: "Spiega a parole tue il concetto di limite finito \\(\\lim_{x\\to x_0}f(x)=\\ell\\) di una funzione e la sua definizione formale.",
    a: "Dire che \\(\\lim_{x\\to x_0}f(x)=\\ell\\) da un punto di vista intuitivo significa che se ci avviciniamo a \\(x_0\\) allora il falore della funzione \\(f(x)\\) si avvicina a \\(\\ell\\). Formalmente: la funzione \\(f\\), definita nel dominio \\(D\\), ha limite \\(\\ell\\in\\mathbb{R}\\) per \\(x\\to x_0\\) (punto di accumulazione di \\(D\\)) se: \\[\\forall\\varepsilon>0\\;\\exists I(x_0):\\;|f(x)-\\ell|<\\varepsilon,\\;\\forall x\\in I(x_0)\\cap D,\\,x\\neq x_0\\], ovvero per ogni \\(\\varepsilon>0\\) fissato, esiste un intorno di \\(x_0\\) tale che per ogni \\(x\\) diverso da \\(x_0\\) in quell'intorno si ha \\(f(x)\\) nell'intorno di \\(\\ell\\) di raggio \\(\\varepsilon\\)."
  },
  {
    cat: "teoria",
    q: "Spiega da un punto di vista geometrico la definizione di limite finito.",
    a: "Fissato \\(\\varepsilon>0\\), si individua la striscia orizzontale \\(]\\ell-\\varepsilon;\\ell+\\varepsilon[\\). Se \\(\\lim_{x\\to x_0}f(x)=\\ell\\), deve esistere un intorno \\(I(x_0)\\) tale che il grafico di \\(f\\) per \\(x\\in I(x_0)\\setminus\\{x_0\\}\\) stia interamente dentro questa striscia. Più piccolo scegliamo \\(\\varepsilon\\), più ristretto (in generale) sarà l'intorno di \\(x_0\\) da prendere. Il comportamento di \\(f\\) in \\(x_0\\) stesso non conta."
  },
  {
    cat: "teoria",
    q: "Qual è la definizione di funzione continua in un punto.",
    a: "La funzione \\(f\\) è <strong>continua nel punto \\(x_0\\)</strong> se: (1) \\(x_0\\) appartiene al dominio \\(D\\) di \\(f\\); (2) esiste \\(\\lim_{x\\to x_0}f(x)\\); (3) tale limite è uguale a \\(f(x_0)\\): \\[\\lim_{x\\to x_0}f(x)=f(x_0)\\] Equivalentemente: per ogni \\(\\varepsilon>0\\) esiste \\(\\delta>0\\) tale che \\(|x-x_0|<\\delta\\Rightarrow|f(x)-f(x_0)|<\\varepsilon\\). Una funzione è continua nel suo dominio se è continua in ogni punto."
  },
  {
    cat: "teoria",
    q: "Quali classi di funzioni sono continue nel loro dominio?",
    a: "Sono continue nel loro dominio: <strong>funzioni costanti</strong> (\\(y=k\\)); <strong>polinomi</strong> (in \\(\\mathbb{R}\\)); <strong>funzioni potenza</strong> \\(y=x^\\alpha\\) (\\(x\\in\\mathbb{R}^+\\)); <strong>funzioni goniometriche</strong> \\(\\sin x\\), \\(\\cos x\\), \\(\\tan x\\), \\(\\cot x\\) (nei rispettivi domini); <strong>esponenziale</strong> \\(y=a^x\\) (\\(a>0\\)); <strong>logaritmo</strong> \\(y=\\log_a x\\) (\\(a>0,a\\neq1\\), in \\(\\mathbb{R}^+\\)); e loro composizioni."
  },
  {
    cat: "teoria",
    q: "Cosa si intende per limite destro e limite sinistro?",
    a: "<strong>Limite destro:</strong> \\(\\lim_{x\\to x_0^+}f(x)=\\ell\\) se per ogni \\(\\varepsilon>0\\) esiste un intorno destro \\(I^+(x_0)=]x_0;x_0+\\delta[\\) tale che \\(|f(x)-\\ell|<\\varepsilon\\) per ogni \\(x\\in I^+\\cap D\\). \\(x\\to x_0^+\\) si legge «\\(x\\) tende a \\(x_0\\) da destra». <strong>Limite sinistro:</strong> analogo con intorno sinistro \\(I^-(x_0)\\). Il limite (bilatero) esiste se e solo se esistono e coincidono entrambi i limiti laterali: \\(\\lim_{x\\to x_0^+}f=\\lim_{x\\to x_0^-}f=\\ell\\)."
  },
  {
    cat: "teoria",
    q: "Definisci il significato di limite infinito \\(\\lim_{x\\to x_0}f(x)=+\\infty\\) da un punto di vista intuitivo, a parole tue e poi formalmente.",
    a: "Intuitivamente \\(\\lim_{x\\to x_0}f(x)=+\\infty\\) se comunque scegliamo una quota \\(M\\) allora avvicinandoci a \\(x_0\\) siamo sicuri che ad un certo punto oltrepasseremo questa quota; sarà \\(\\lim_{x\\to x_0}f(x)=-\\infty\\) se invece avvicinandoci a \\(x_0\\) la funzione scenderà al di sotto della quota \\(-M\\). Formalmente: se per ogni numero reale positivo \\(M\\) si può determinare un intorno completo \\(I(x_0)\\) di \\(x_0\\) tale che \\(f(x)>M\\) per ogni \\(x\\in I(x_0)\\setminus\\{x_0\\}\\cap D\\). In simboli: \\(\\forall M>0\\;\\exists I(x_0):\\;f(x)>M,\\,\\forall x\\in I(x_0),\\,x\\neq x_0\\). Analogamente per \\(-\\infty\\): si chiede \\(f(x)<-M\\). La funzione si dice in questi casi <em>divergente</em>."
  },
  {
    cat: "teoria",
    q: "Definizione di asintoto verticale.",
    a: "La retta \\(x=c\\) è un <strong>asintoto verticale</strong> per il grafico di \\(f\\) se si verifica almeno uno dei seguenti limiti: \\[\\lim_{x\\to c^+}f(x)=\\pm\\infty,\\quad\\lim_{x\\to c^-}f(x)=\\pm\\infty\\] Se il limite è \\(+\\infty\\) solo per \\(x\\to c^+\\) si parla di asintoto verticale destro; solo per \\(x\\to c^-\\) di sinistro. La distanza di un punto del grafico dall'asintoto tende a 0 quando \\(x\\to c\\)."
  },
  {
    cat: "teoria",
    q: "Definizione di limite finito per \\(x\\to+\\infty\\) e \\(x\\to-\\infty\\).",
    a: "\\(\\lim_{x\\to+\\infty}f(x)=\\ell\\) se per ogni \\(\\varepsilon>0\\) esiste un intorno di \\(+\\infty\\), cioè \\(]c;+\\infty[\\), tale che \\(|f(x)-\\ell|<\\varepsilon\\) per ogni \\(x>c\\). In simboli: \\(\\forall\\varepsilon>0\\;\\exists c>0:\\;|f(x)-\\ell|<\\varepsilon,\\,\\forall x>c\\). Analogamente per \\(x\\to-\\infty\\): si trovano \\(x<-c\\). Geometricamente: la funzione si avvicina alla retta orizzontale \\(y=\\ell\\)."
  },
  {
    cat: "teoria",
    q: "Definizione di asintoto orizzontale.",
    a: "La retta \\(y=q\\) è un <strong>asintoto orizzontale</strong> per il grafico di \\(f\\) se si verifica almeno una delle condizioni: \\[\\lim_{x\\to+\\infty}f(x)=q\\quad\\text{oppure}\\quad\\lim_{x\\to-\\infty}f(x)=q\\] La distanza di un generico punto \\(P(x;f(x)\\)) del grafico dall'asintoto \\(y=q\\) tende a 0: \\(\\lim_{x\\to\\pm\\infty}|f(x)-q|=0\\). Una funzione può avere al più due asintoti orizzontali, uno per \\(x\\to+\\infty\\) e uno per \\(x\\to-\\infty\\)."
  },
  {
    cat: "teoria",
    q: "Definizione di limite \\(+\\infty\\) per \\(x\\to+\\infty\\).",
    a: "\\(\\lim_{x\\to+\\infty}f(x)=+\\infty\\) se per ogni \\(M>0\\) esiste un intorno di \\(+\\infty\\), cioè \\(]c;+\\infty[\\), tale che \\(f(x)>M\\) per ogni \\(x>c\\). In simboli: \\(\\forall M>0\\;\\exists c>0:\\;f(x)>M,\\,\\forall x>c\\). Analogamente si definiscono \\(\\lim_{x\\to+\\infty}f=-\\infty\\), \\(\\lim_{x\\to-\\infty}f=+\\infty\\) e \\(\\lim_{x\\to-\\infty}f=-\\infty\\). La funzione si dice <em>divergente positivamente</em> (o negativamente)."
  },
  {
    cat: "teoria",
    q: "Teorema di unicità del limite: enunciato.",

  {

  },
  {
    cat: "ragionamento",

  },
  {
    cat: "ragionamento",
    q: "Un insieme numericamente infinito di punti isolati può avere punti di accumulazione?",
    a: "Sì. I numeri naturali \\(\\mathbb{N}=\\{0,1,2,3,\\ldots\\}\\) sono tutti punti isolati (per ciascun \\(n\\) l'intorno \\(]n-\\frac{1}{2};n+\\frac{1}{2}[\\) non contiene altri naturali) e non hanno punti di accumulazione in \\(\\mathbb{R}\\). Ma l'insieme \\(\\left\\{\\frac{1}{n}:n\\in\\mathbb{N}^*\\right\\}\\) ha tutti punti isolati <em>e</em> il punto 0 come punto di accumulazione (non appartenente all'insieme). Quindi infinità dell'insieme non implica punti di accumulazione."

  {

  {

  },
  {

    a: "Il Teorema del confronto (squeeze theorem) è lo strumento chiave per dimostrare limiti notevoli. Per \\(\\lim_{x\\to0}\\frac{\\sin x}{x}=1\\) si usa la disuguaglianza geometrica \\(\\cos x\\leq\\frac{\\sin x}{x}\\leq1\\) per \\(x\\in]0;\\frac{\\pi}{2}[\\). Poiché \\(\\lim_{x\\to0}\\cos x=1\\) e \\(\\lim_{x\\to0}1=1\\), il teorema del confronto conclude che \\(\\lim_{x\\to0}\\frac{\\sin x}{x}=1\\). Senza il teorema del confronto questo limite sarebbe molto difficile da dimostrare rigorosamente."
  },
  {
    cat: "ragionamento",
    q: "Cosa distingue un punto di accumulazione da un punto isolato, e perché questa distinzione è fondamentale per i limiti?",
    a: "Un punto di accumulazione \\(x_0\\) di \\(A\\) ha la proprietà che ogni suo intorno contiene infiniti punti di \\(A\\) diversi da \\(x_0\\): ci sono sempre punti di \\(A\\) 'vicini arbitrariamente' a \\(x_0\\). Un punto isolato ha un intorno che non contiene altri punti di \\(A\\): non ci sono punti del dominio vicini ad esso. La definizione di limite richiede di poter 'avvicinare' \\(x\\) a \\(x_0\\) rimanendo nel dominio: questo è possibile solo se \\(x_0\\) è un punto di accumulazione. In un punto isolato il limite sarebbe indefinito o banale."
  }
];

// ─── STATE & LOGIC ───────────────────────────────────────────────────────────
let filtered=[...cards],deck=[...cards],idx=0,currentFilter="all",currentMode="quiz";

document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentFilter=btn.dataset.filter;applyFilter();
}));
document.querySelectorAll(".mode-btn").forEach(btn=>btn.addEventListener("click",()=>{
  document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");currentMode=btn.dataset.mode;switchMode();
}));

function applyFilter(){
  filtered=currentFilter==="all"?[...cards]:cards.filter(c=>c.cat===currentFilter);
  deck=[...filtered];idx=0;
  document.getElementById("stat-pill").textContent=filtered.length+" carte";
  if(currentMode==="quiz"){
    document.getElementById("score-panel").classList.remove("visible");
    document.getElementById("flip-scene").style.display="";
    document.querySelectorAll(".quiz-nav button").forEach(b=>b.disabled=false);
    renderCard();
  } else renderBrowse();
}

function switchMode(){
  if(currentMode==="quiz"){
    document.getElementById("browse-view").style.display="none";
    document.getElementById("quiz-view").style.display="flex";
    deck=[...filtered];idx=0;
    document.getElementById("score-panel").classList.remove("visible");
    document.getElementById("flip-scene").style.display="";
    document.querySelector(".quiz-nav").style.display="";
    renderCard();
  } else {
    document.getElementById("quiz-view").style.display="none";
    document.getElementById("browse-view").style.display="grid";
    renderBrowse();
  }
}

function renderCard(){
  if(!deck.length)return;
  const c=deck[idx];
  const fc=document.getElementById("flip-card");
  fc.classList.remove("flipped");fc.dataset.cat=c.cat;
  document.getElementById("fc-tag").textContent=c.cat.charAt(0).toUpperCase()+c.cat.slice(1);
  document.getElementById("fc-q").innerHTML=c.q;
  document.getElementById("fc-a").innerHTML=c.a;
  document.getElementById("qcounter").textContent=(idx+1)+" / "+deck.length;
  document.getElementById("qpf").style.width=((idx+1)/deck.length*100)+"%";
  document.getElementById("btn-prev").disabled=idx===0;
  document.getElementById("btn-next").textContent=idx===deck.length-1?"Fine ✓":"Avanti →";
  if(window.MathJax)MathJax.typesetPromise([document.getElementById("flip-card")]);
}

function flipCard(){document.getElementById("flip-card").classList.toggle("flipped");}
function nextCard(){
  if(idx<deck.length-1){idx++;renderCard();}
  else{
    document.getElementById("flip-scene").style.display="none";
    document.querySelector(".quiz-nav").style.display="none";
    document.getElementById("score-num").textContent=deck.length;
    document.getElementById("score-panel").classList.add("visible");
  }
}
function prevCard(){if(idx>0){idx--;renderCard();}}
function shuffle(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;document.getElementById("score-panel").classList.remove("visible");
  document.getElementById("flip-scene").style.display="";document.querySelector(".quiz-nav").style.display="";renderCard();
}
function restart(){
  deck=[...filtered];idx=0;
  document.getElementById("score-panel").classList.remove("visible");
  document.getElementById("flip-scene").style.display="";document.querySelector(".quiz-nav").style.display="";renderCard();
}
function renderBrowse(){
  const container=document.getElementById("browse-view");container.innerHTML="";
  filtered.forEach((c,i)=>{
    const div=document.createElement("div");div.className="browse-card";div.dataset.cat=c.cat;
    div.innerHTML=`<div class="bc-header"><span class="bc-num">#${i+1}</span><span class="bc-tag tag-${c.cat}">${c.cat.charAt(0).toUpperCase()+c.cat.slice(1)}</span></div><div class="bc-q">${c.q}</div><div class="bc-divider"></div><div class="bc-a-label">Risposta</div><div class="bc-a">${c.a}</div>`;
    container.appendChild(div);
  });
  if(window.MathJax)MathJax.typesetPromise([container]);
}
renderCard();
</script>
</body>
</html>
